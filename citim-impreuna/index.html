<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4c3aa3" />
  <title>Citim împreună</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <div class="header-top">
      <h1>📖 Citim împreună</h1>
      <div class="score-chip" id="score-chip" title="Punctajul tău">⭐ <span id="score">0</span></div>
    </div>
    <div class="header-sub">
      <button class="user-chip" id="user-chip" title="Schimbă utilizatorul">👤 <span id="user-name"></span></button>
      <button class="icon-btn" id="stats-btn" title="Statistici">📊 Statistici</button>
    </div>
  </header>

  <main>
    <div class="progress" id="progress"></div>

    <div id="verses-container"></div>
    <div class="cheer" id="cheer" hidden></div>

    <div class="actions">
      <button class="btn primary" id="check-btn">Verifică</button>
      <button class="btn primary" id="next-btn" hidden>Pagina următoare →</button>
    </div>
  </main>

  <div class="modal-backdrop" id="name-modal" hidden>
    <div class="modal">
      <h2>Cum te cheamă?</h2>
      <input id="name-input" type="text" maxlength="20" placeholder="Numele tău" autocomplete="off" />
      <button class="btn primary" id="name-save">Începe</button>
    </div>
  </div>

  <canvas id="confetti"></canvas>

  <script src="js/config.js"></script>
  <script src="js/verses-1samuel.js"></script>
  <script src="js/verses.js"></script>
  <script src="js/tracker.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
