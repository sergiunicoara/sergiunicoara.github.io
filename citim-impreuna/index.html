<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4c3aa3" />
  <title>Citim împreună</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>📖 Citim împreună</h1>
    <div class="score-chip" id="score-chip" title="Punctajul tău">⭐ <span id="score">0</span></div>
  </header>

  <main>
    <div class="progress" id="progress"></div>

    <section class="card" id="card">
      <div class="ref" id="ref"></div>
      <p class="verse" id="verse"></p>
      <div class="cheer" id="cheer" hidden></div>
    </section>

    <div class="actions">
      <button class="btn primary" id="check-btn">Verifică</button>
      <button class="btn primary" id="next-btn" hidden>Următorul verset →</button>
    </div>
  </main>

  <canvas id="confetti"></canvas>

  <script src="js/verses.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
