<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GraphRAG IATF 16949 — Sergiu Nicoară</title>
<style>
  :root {
    --navy: #1F3864;
    --navy-light: #2A4A7F;
    --blue: #2E75B6;
    --white: #FFFFFF;
    --muted: #C9D6EA;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--white);
    background: var(--navy);
    line-height: 1.6;
  }

  section {
    padding: 80px 20px;
  }

  .section-light {
    background: var(--navy);
  }

  .section-dark {
    background: #16294A;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
  }

  /* Language switcher */
  .lang-switch {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 1000;
    display: flex;
    gap: 6px;
    background: rgba(0,0,0,0.25);
    padding: 4px;
    border-radius: 999px;
    backdrop-filter: blur(6px);
  }

  .lang-switch button {
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .lang-switch button.active {
    background: var(--blue);
    color: var(--white);
  }

  /* Hero */
  .hero {
    min-height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: linear-gradient(160deg, var(--navy) 0%, #16294A 100%);
    padding: 120px 20px 80px;
  }

  .hero h1 {
    font-size: 2.2rem;
    font-weight: 800;
    max-width: 800px;
    margin: 0 auto 20px;
    line-height: 1.3;
  }

  .hero p {
    font-size: 1.1rem;
    color: var(--muted);
    max-width: 640px;
    margin: 0 auto 32px;
  }

  .btn {
    display: inline-block;
    background: var(--blue);
    color: var(--white);
    text-decoration: none;
    font-weight: 700;
    font-size: 1rem;
    padding: 14px 32px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
  }

  .btn:hover {
    background: #3a86d1;
    transform: translateY(-2px);
  }

  /* Section headings */
  h2 {
    font-size: 1.9rem;
    font-weight: 800;
    text-align: center;
    margin-bottom: 48px;
  }

  h3 {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--white);
  }

  /* Problem cards */
  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }

  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 28px 24px;
    font-size: 1rem;
    color: var(--muted);
  }

  /* Video */
  .video-wrap {
    text-align: center;
    margin-bottom: 24px;
  }

  .video-wrap p {
    color: var(--muted);
    max-width: 640px;
    margin: 0 auto 32px;
  }

  .video-responsive {
    position: relative;
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
    aspect-ratio: 16 / 9;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
    background: #0E1A30;
  }

  .video-responsive iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: 0;
  }

  /* Metrics */
  .metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 32px;
  }

  .metric-box {
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 28px 16px;
    text-align: center;
    background: rgba(255,255,255,0.03);
  }

  .metric-box .value {
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--blue);
    margin-bottom: 8px;
  }

  .metric-box .label {
    font-size: 0.9rem;
    color: var(--muted);
  }

  .note {
    text-align: center;
    color: var(--muted);
    font-size: 0.95rem;
    max-width: 700px;
    margin: 0 auto;
  }

  /* Pilot */
  .pilot-phases {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
  }

  .phase {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 28px;
  }

  .phase ul {
    list-style: none;
    margin-top: 16px;
  }

  .phase li {
    color: var(--muted);
    margin-bottom: 10px;
    padding-left: 22px;
    position: relative;
  }

  .phase li::before {
    content: "✓";
    color: var(--blue);
    position: absolute;
    left: 0;
    font-weight: 700;
  }

  .phase .price {
    color: var(--white);
    font-weight: 700;
  }

  .disclaimer {
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    max-width: 700px;
    margin: 0 auto;
    font-style: italic;
  }

  /* Final CTA */
  .cta-final {
    text-align: center;
  }

  .cta-final p {
    color: var(--muted);
    max-width: 500px;
    margin: 0 auto 32px;
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 40px 20px;
    background: #0E1A30;
    color: var(--muted);
    font-size: 0.9rem;
  }

  footer a {
    color: var(--blue);
    text-decoration: none;
  }

  footer a:hover {
    text-decoration: underline;
  }

  footer .links {
    margin-top: 8px;
  }

  /* Fade-in on scroll */
  .fade-in {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.6s ease-out, transform 0.6s ease-out;
  }

  .fade-in.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Mobile */
  @media (max-width: 768px) {
    .hero h1 { font-size: 1.6rem; }
    .hero p { font-size: 1rem; }
    h2 { font-size: 1.5rem; }
    .cards { grid-template-columns: 1fr; }
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .pilot-phases { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="lang-switch">
  <button id="btn-ro" onclick="setLang('ro')">RO</button>
  <button id="btn-en" onclick="setLang('en')">EN</button>
</div>

<!-- SECTION 1: HERO -->
<section class="hero">
  <div>
    <h1 data-i18n="hero.title"></h1>
    <p data-i18n="hero.subtitle"></p>
    <a class="btn" href="#video" data-i18n="hero.cta"></a>
  </div>
</section>

<!-- SECTION 2: PROBLEMA -->
<section class="section-dark fade-in">
  <div class="container">
    <h2 data-i18n="problem.title"></h2>
    <div class="cards">
      <div class="card" data-i18n="problem.card1"></div>
      <div class="card" data-i18n="problem.card2"></div>
      <div class="card" data-i18n="problem.card3"></div>
    </div>
  </div>
</section>

<!-- SECTION 3: VIDEO -->
<section id="video" class="section-light fade-in">
  <div class="container video-wrap">
    <h2 data-i18n="video.title"></h2>
    <p data-i18n="video.subtitle"></p>
    <div class="video-responsive">
      <iframe src="https://www.youtube.com/embed/PLACEHOLDER_VIDEO_ID" title="Demo video" allowfullscreen></iframe>
    </div>
  </div>
</section>

<!-- SECTION 4: REZULTATE -->
<section class="section-dark fade-in">
  <div class="container">
    <h2 data-i18n="results.title"></h2>
    <div class="metrics">
      <div class="metric-box">
        <div class="value">&lt; 2 sec</div>
        <div class="label" data-i18n="results.metric1"></div>
      </div>
      <div class="metric-box">
        <div class="value">0.93</div>
        <div class="label" data-i18n="results.metric2"></div>
      </div>
      <div class="metric-box">
        <div class="value">10/13</div>
        <div class="label" data-i18n="results.metric3"></div>
      </div>
      <div class="metric-box">
        <div class="value">30 doc</div>
        <div class="label" data-i18n="results.metric4"></div>
      </div>
    </div>
    <p class="note" data-i18n="results.note"></p>
  </div>
</section>

<!-- SECTION 5: PILOT -->
<section class="section-light fade-in">
  <div class="container">
    <h2 data-i18n="pilot.title"></h2>
    <div class="pilot-phases">
      <div class="phase">
        <h3 data-i18n="pilot.phase1.title"></h3>
        <ul>
          <li data-i18n="pilot.phase1.b1"></li>
          <li data-i18n="pilot.phase1.b2"></li>
          <li data-i18n="pilot.phase1.b3"></li>
          <li class="price" data-i18n="pilot.phase1.b4"></li>
        </ul>
      </div>
      <div class="phase">
        <h3 data-i18n="pilot.phase2.title"></h3>
        <ul>
          <li data-i18n="pilot.phase2.b1"></li>
          <li data-i18n="pilot.phase2.b2"></li>
          <li data-i18n="pilot.phase2.b3"></li>
          <li class="price" data-i18n="pilot.phase2.b4"></li>
        </ul>
      </div>
    </div>
    <p class="disclaimer" data-i18n="pilot.disclaimer"></p>
  </div>
</section>

<!-- SECTION 6: CTA FINAL -->
<section class="section-dark cta-final fade-in">
  <div class="container">
    <h2 data-i18n="cta.title"></h2>
    <p data-i18n="cta.subtitle"></p>
    <a class="btn" href="mailto:sergiu@example.com" data-i18n="cta.button"></a>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div>Sergiu Nicoară — AI Engineer | Timișoara, România</div>
  <div class="links">
    <a href="https://github.com/sergiunicoara" target="_blank" rel="noopener">GitHub</a>
    &nbsp;·&nbsp;
    <a href="https://www.linkedin.com/in/sergiu-nicoara-31b27013/" target="_blank" rel="noopener">LinkedIn</a>
  </div>
</footer>

<script>
const translations = {
  ro: {
    hero: {
      title: "Găsești răspunsul corect din documentele tale IATF 16949 în 10 secunde — cu sursa exactă și revizia corectă.",
      subtitle: "Fără căutări în SharePoint. Fără riscul de a cita revizia greșită la audit.",
      cta: "Vezi demo →"
    },
    problem: {
      title: "Îți recunoști situația?",
      card1: "Proceduri contradictorii între revizii pe care nimeni nu le-a prins — până la audit",
      card2: "Ingineri care pierd 2-4 ore pe zi căutând în foldere și SharePoint",
      card3: "Risc de neconformitate dacă se citează documentul greșit în fața auditorului"
    },
    video: {
      title: "Vezi sistemul în acțiune",
      subtitle: "Demo live pe un corpus de 30 documente IATF 16949 cu contradicții deliberate ingerate"
    },
    results: {
      title: "Rezultate măsurabile",
      metric1: "timp de răspuns",
      metric2: "scor faithfulness (RAGAS)",
      metric3: "scenarii de audit trecute",
      metric4: "corpus testat",
      note: "Cele 3 scenarii rămase sunt edge case-uri documentate arhitectural — cauzele sunt identificate exact."
    },
    pilot: {
      title: "Pilot în două faze",
      phase1: {
        title: "Discovery — 2 săptămâni",
        b1: "Ingerăm 20-30 de documente reale ale tale",
        b2: "Construim un set de întrebări de audit împreună",
        b3: "Rulăm evaluarea și îți arătăm rezultatele",
        b4: "Preț: €500 – €1.500"
      },
      phase2: {
        title: "Implementare completă",
        b1: "Sistem complet pe infrastructura ta sau cloud",
        b2: "Integrare cu documentele existente",
        b3: "Training echipă",
        b4: "Preț: €3.000 – €6.000"
      },
      disclaimer: "Faza 2 se derulează doar dacă Faza 1 validează rezultatele pe documentele tale."
    },
    cta: {
      title: "Hai să testăm pe documentele tale",
      subtitle: "O discuție de 30 de minute ca să vedem dacă are sens un pilot.",
      button: "Programează o discuție"
    }
  },
  en: {
    hero: {
      title: "Find the correct answer from your IATF 16949 documents in 10 seconds — with the exact source and correct revision.",
      subtitle: "No more SharePoint searches. No risk of citing the wrong revision during an audit.",
      cta: "Watch demo →"
    },
    problem: {
      title: "Does this sound familiar?",
      card1: "Contradictory procedures between revisions nobody caught — until the audit",
      card2: "Engineers losing 2-4 hours daily searching through folders and SharePoint",
      card3: "Non-conformance risk when the wrong document is cited in front of the auditor"
    },
    video: {
      title: "See the system in action",
      subtitle: "Live demo on a corpus of 30 IATF 16949 documents with deliberately ingested contradictions"
    },
    results: {
      title: "Measurable results",
      metric1: "response time",
      metric2: "faithfulness score (RAGAS)",
      metric3: "audit scenarios passed",
      metric4: "documents tested",
      note: "The remaining 3 scenarios are documented architectural edge cases — root causes are precisely identified."
    },
    pilot: {
      title: "Two-phase pilot",
      phase1: {
        title: "Discovery — 2 weeks",
        b1: "We ingest 20-30 of your real documents",
        b2: "We build an audit question set together",
        b3: "We run the evaluation and show you the results",
        b4: "Price: €500 – €1,500"
      },
      phase2: {
        title: "Full implementation",
        b1: "Full system on your infrastructure or cloud",
        b2: "Integration with existing documents",
        b3: "Team training",
        b4: "Price: €3,000 – €6,000"
      },
      disclaimer: "Phase 2 only proceeds if Phase 1 validates results on your actual documents."
    },
    cta: {
      title: "Let's test it on your documents",
      subtitle: "A 30-minute call to see if a pilot makes sense.",
      button: "Schedule a call"
    }
  }
};

function getNested(obj, path) {
  return path.split('.').reduce((o, k) => (o || {})[k], obj);
}

function setLang(lang) {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const text = getNested(translations[lang], el.getAttribute('data-i18n'));
    if (text !== undefined) el.textContent = text;
  });
  document.getElementById('btn-ro').classList.toggle('active', lang === 'ro');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  localStorage.setItem('lang', lang);
}

const savedLang = localStorage.getItem('lang') || 'ro';
setLang(savedLang);

// Fade-in on scroll
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
    }
  });
}, { threshold: 0.15 });

document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>

</body>
</html>
