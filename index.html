<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <title>Sergiu’s AI Recruiter Agent</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body { background-color: #0f172a; }
    </style>
  </head>

  <body class="h-full text-slate-100">
    <div class="min-h-full flex flex-col">

      <!-- HEADER BAR -->
      <header class="border-b border-slate-700/50 bg-slate-900/50 backdrop-blur">
        <div class="mx-auto max-w-5xl px-4 py-4 flex items-center space-x-3">

          <!-- ⭐ Restored SR icon -->
          <div class="h-8 w-8 rounded-xl bg-sky-500/20 border border-sky-500/40 flex items-center justify-center">
            <span class="text-sky-400 font-semibold text-sm">SR</span>
          </div>

          <!-- Title -->
          <h1 class="text-xl font-semibold tracking-tight text-slate-100">
            Sergiu’s AI Recruiter Agent
          </h1>
        </div>
      </header>

      <!-- MAIN APP -->
      <main class="flex-1 mx-auto max-w-5xl w-full px-4 py-6">

        <!-- Intro Section -->
        <div class="mb-6">
          <p class="text-slate-300 text-lg">
            Paste a job description or describe the role you’re hiring for.
          </p>
          <p class="text-slate-400 text-sm mt-1">
            I’ll extract the key requirements, analyze Sergiu’s experience, and generate a tailored recruiter-focused match.
          </p>
        </div>

        <!-- Chat Output -->
        <div id="output"
             class="whitespace-pre-wrap p-4 rounded-xl border border-slate-700 bg-slate-800/30 text-slate-200 min-h-[200px]">
        </div>

        <!-- Input Form -->
        <form id="chat-form" class="mt-6 flex space-x-2">
          <input
            id="prompt-input"
            type="text"
            placeholder="Paste job description or role…"
            class="flex-1 px-3 py-2 bg-slate-800/80 border border-slate-700/50 rounded-lg text-slate-100"
          />
          <button
            type="submit"
            class="px-4 py-2 rounded-lg bg-sky-600 hover:bg-sky-500 text-white font-semibold">
            Analyze
          </button>
        </form>
      </main>
    </div>

    <!-- CLIENT SCRIPT -->
    <script>
      const form = document.getElementById("chat-form");
      const input = document.getElementById("prompt-input");
      const output = document.getElementById("output");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const prompt = input.value.trim();
        if (!prompt) return;

        output.textContent = "Thinking…";

        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt }),
        });

        const data = await res.json();
        output.textContent = data.reply || "(No response)";
      });
    </script>
  </body>
</html>
